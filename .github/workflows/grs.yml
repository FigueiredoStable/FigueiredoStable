name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&rank_icon=default&hide_rank=true&show=reviews,discussions_started,discussions_answered,prs_merged,prs_merged_percentage,prs_commented,prs_reviewed,issues_commented&show_icons=true&include_all_commits=true&theme=dracula)](https://github-stats-extended.vercel.app/api?username=anuraghazra&rank_icon=default&hide_rank=true&show=reviews,discussions_started,discussions_answered,prs_merged,prs_merged_percentage,prs_commented,prs_reviewed,issues_commented&show_icons=true&include_all_commits=true&theme=dracula&hide=html&card_width=800
          path: profile/stats.svg
          token: ${{ secrets.TOKEN_FOR_STATUS_GRAPHS }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=10&layout=compact&theme=dracula&exclude_repo=github_stats,github-readme-streak-stats,figueiredostable.github.io&hide=html&card_width=800)
          path: profile/top-langs.svg
          token: ${{ secrets.TOKEN_FOR_STATUS_GRAPHS }}
      
      - name: Generate harloks wakatime stats
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: wakatime
          options: username=figueiredostabletime&layout=compact&theme=synthwave&hide=html&card_width=800
          path: profile/wakatime-stats.svg
          token: ${{ secrets.WAKATIME_API }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
